name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy Backend
        run: |
          cd /home/ubuntu/Trajectory

          git fetch origin
          git reset --hard origin/main

          docker compose down
          docker compose up --build -d

          docker image prune -f