<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E707B" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
  </defs>
  <!-- Ascending background metrics bars -->
  <rect x="22" y="65" width="8" height="15" rx="2" fill="#0E707B" opacity="0.3" />
  <rect x="37" y="45" width="8" height="35" rx="2" fill="#0E707B" opacity="0.6" />
  <rect x="52" y="25" width="8" height="55" rx="2" fill="#14B8A6" opacity="0.9" />
  
  <!-- Elegant rising career trajectory curve -->
  <path d="M 15 85 C 35 80, 60 50, 80 20" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" />
  <!-- Sharp arrow head -->
